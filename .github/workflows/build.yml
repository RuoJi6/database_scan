name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test CLI and GUI
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.5"
          cache: true
          cache-dependency-path: |
            go.sum
            gui/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Test CLI packages
        run: go test ./...

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Check GUI frontend
        working-directory: gui/frontend
        run: |
          npm ci
          npm run check
          npm run build

      - name: Test GUI Go package
        working-directory: gui
        run: go test -tags webkit2_41 ./...

  build:
    name: Build CLI ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: "386"
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: "386"
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.5"
          cache: true
          cache-dependency-path: go.sum

      - name: Build CLI
        shell: bash
        run: |
          mkdir -p dist
          suffix=""
          if [ "${{ matrix.goos }}" = "windows" ]; then suffix=".exe"; fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" \
            -o "dist/database_scan-${{ matrix.goos }}-${{ matrix.goarch }}${suffix}" \
            ./cmd/database_scan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: database_scan-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  gui-build:
    name: Build GUI ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-amd64
            os: macos-latest
            platform: darwin/amd64
            tags: ""
          - name: darwin-arm64
            os: macos-latest
            platform: darwin/arm64
            tags: ""
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            tags: ""
          - name: windows-arm64
            os: windows-latest
            platform: windows/arm64
            tags: ""
          - name: linux-amd64
            os: ubuntu-24.04
            platform: linux/amd64
            tags: webkit2_41
          - name: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux/arm64
            tags: webkit2_41
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.5"
          cache: true
          cache-dependency-path: |
            go.sum
            gui/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build GUI
        shell: bash
        working-directory: gui
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            wails build -clean -platform "${{ matrix.platform }}" -tags "${{ matrix.tags }}"
          else
            wails build -clean -platform "${{ matrix.platform }}"
          fi

      - name: Sign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        working-directory: gui
        run: |
          codesign --force --deep --sign - "build/bin/database_scan_gui.app"

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: database_scan_gui-${{ matrix.name }}
          path: gui/build/bin/**

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
      - gui-build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Pack release assets
        shell: bash
        run: |
          mkdir -p release
          find dist -type f -path '*/Contents/MacOS/*' -exec chmod 755 {} \;
          find dist -type f \( -name 'database_scan-linux-*' -o -name 'database_scan-darwin-*' -o -name 'gui' \) -exec chmod 755 {} \;
          for dir in dist/*; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            (cd "$dir" && zip -r "../../release/${name}.zip" .)
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
